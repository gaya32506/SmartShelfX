<div class="auth-wrapper">
    <div class="auth-card glass-panel">
        <div class="auth-header">
            <div class="logo">
                <span class="material-symbols-outlined logo-icon">inventory_2</span>
                <h2>SmartShelfX</h2>
            </div>
            <p class="subtitle">Welcome back! Please login to your account.</p>
        </div>

        <form class="auth-form">
            <div class="form-group">
                <label class="form-label">Email Address / Username</label>
                <div class="input-with-icon">
                    <span class="material-symbols-outlined icon">mail</span>
                    <input type="text" class="form-control" placeholder="admin@smartshelfx.com">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-with-icon">
                    <span class="material-symbols-outlined icon">lock</span>
                    <input type="password" class="form-control" placeholder="••••••••">
                </div>
            </div>

            <div class="form-options">
                <label class="checkbox-label">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <button type="button" class="btn btn-primary btn-block" routerLink="/dashboard">
                Sign In
            </button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a routerLink="/register">Register here</a></p>
        </div>
    </div>
</div>
