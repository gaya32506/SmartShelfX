<div class="auth-wrapper">
    <div class="auth-card glass-panel">
        <div class="auth-header">
            <div class="logo">
                <span class="material-symbols-outlined logo-icon">inventory_2</span>
                <h2>SmartShelfX</h2>
            </div>
            <p class="subtitle">Create an account to manage your inventory.</p>
        </div>

        <form class="auth-form" (ngSubmit)="onRegister()">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <div class="input-with-icon">
                    <span class="material-symbols-outlined icon">person</span>
                    <input type="text" name="fullName" [(ngModel)]="registerData.fullName" class="form-control" placeholder="XYZ" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Email Address</label>
                <div class="input-with-icon">
                    <span class="material-symbols-outlined icon">mail</span>
                    <input type="email" name="email" [(ngModel)]="registerData.email" class="form-control" placeholder="XYZ@gmail.com" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Role</label>
                <div class="input-with-icon">
                    <span class="material-symbols-outlined icon">badge</span>
                    <select name="role" [(ngModel)]="registerData.role" class="form-control">
                        <option value="manager">Warehouse Manager</option>
                        <option value="vendor">Vendor</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-with-icon">
                    <span class="material-symbols-outlined icon">lock</span>
                    <input type="password" name="password" [(ngModel)]="registerData.password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                Create Account
            </button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a routerLink="/login">Log in here</a></p>
        </div>
    </div>
</div>
