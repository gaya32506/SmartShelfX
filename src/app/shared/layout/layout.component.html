<div class="layout-wrapper" [class.sidebar-closed]="!isSidebarOpen">
    <aside class="sidebar glass-panel">
        <div class="sidebar-header">
            <div class="logo">
                <span class="material-symbols-outlined logo-icon">inventory_2</span>
                <h2 *ngIf="isSidebarOpen">SmartShelfX</h2>
            </div>
            <button class="toggle-btn" (click)="toggleSidebar()">
                <span class="material-symbols-outlined">
                    {{ isSidebarOpen ? 'chevron_left' : 'chevron_right' }}
                </span>
            </button>
        </div>

        <nav class="sidebar-nav">
            <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
                <span class="material-symbols-outlined nav-icon">dashboard</span>
                <span class="nav-label" *ngIf="isSidebarOpen">Dashboard</span>
            </a>
            <a routerLink="/inventory" routerLinkActive="active" class="nav-item">
                <span class="material-symbols-outlined nav-icon">category</span>
                <span class="nav-label" *ngIf="isSidebarOpen">Inventory Catalog</span>
            </a>
            <a routerLink="/transactions" routerLinkActive="active" class="nav-item">
                <span class="material-symbols-outlined nav-icon">swap_horiz</span>
                <span class="nav-label" *ngIf="isSidebarOpen">Transactions</span>
            </a>
            <a routerLink="/forecast" routerLinkActive="active" class="nav-item">
                <span class="material-symbols-outlined nav-icon">online_prediction</span>
                <span class="nav-label" *ngIf="isSidebarOpen">AI Forecast</span>
            </a>
            <a routerLink="/restock" routerLinkActive="active" class="nav-item">
                <span class="material-symbols-outlined nav-icon">shopping_cart_checkout</span>
                <span class="nav-label" *ngIf="isSidebarOpen">Auto-Restock</span>
            </a>
            <a routerLink="/alerts" routerLinkActive="active" class="nav-item">
                <span class="material-symbols-outlined nav-icon">notifications_active</span>
                <span class="nav-label" *ngIf="isSidebarOpen">Alerts Center</span>
            </a>
            <a routerLink="/login" class="nav-item logout">
                <span class="material-symbols-outlined nav-icon">logout</span>
                <span class="nav-label" *ngIf="isSidebarOpen">Logout</span>
            </a>
            <a routerLink="/analytics" routerLinkActive="active" class="nav-item">
                <span class="material-symbols-outlined nav-icon">analytics</span>
                <span class="nav-label" *ngIf="isSidebarOpen">Analytics</span>
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar glass-panel">
            <div class="topbar-right">
                <div class="notification-bell" [routerLink]="['/alerts']">
                    <span class="material-symbols-outlined">notifications</span>
                    <span class="notification-badge">3</span>
                </div>
                <div class="user-profile">
                    <span class="username" *ngIf="isSidebarOpen">Admin</span>
                    <span class="material-symbols-outlined">account_circle</span>
                </div>
            </div>
        </header>

        <div class="content-area">
            <router-outlet></router-outlet>
        </div>
    </main>
</div>
